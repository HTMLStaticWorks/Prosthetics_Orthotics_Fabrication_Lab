<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta charset="UTF-8">
  <!-- Favicons - ApexFlex Logo -->
  <link class="favicon-target" rel="icon" type="image/x-icon" href="../assets/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
  <meta name="theme-color" content="#3B0764">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexFlex - Portal Registration</title>
  <meta name="description" content="Register for the ApexFlex portal. Manage prescription adjustments, submit physician referrals, and access exercise guides.">
  
  <!-- Tailwind CSS 3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: 'rgb(var(--rgb-primary) / <alpha-value>)',
              secondary: 'rgb(var(--rgb-secondary) / <alpha-value>)',
              accent: 'rgb(var(--rgb-accent) / <alpha-value>)',
              dark: 'rgb(var(--rgb-dark) / <alpha-value>)',
              light: 'rgb(var(--rgb-light) / <alpha-value>)',
              purple: '#3B0764',
              lavender: '#E9D5FF',
              blue: '#0EA5E9',
              charcoal: '#111827',
              pink: '#FBCFE8',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-gradient-to-tr from-[#f5f3ff] via-[#f0f9ff] to-[#fdf2f8] text-gray-900 dark:bg-gradient-to-br dark:from-[#0c051a] dark:via-[#090d16] dark:to-[#0a1526] dark:text-gray-100 min-h-screen w-full flex items-center justify-center font-sans transition-colors duration-300 relative overflow-y-auto overflow-x-hidden p-4 pt-20 sm:p-8 dark:bg-[#0A0A0A] dark:text-gray-100">

  <!-- SKELETON LOADING STATE -->
  <div class="skeleton-wrapper fixed inset-0 z-[99] bg-[#f5f3ff] dark:bg-[#0c051a] flex items-center justify-center p-4">
    <div class="w-[90%] max-w-[380px] sm:max-w-[420px] md:max-w-[460px] h-[650px] skeleton-bg rounded-[24px]"></div>
  </div>

  <!-- Bionic Hand / Medical Tech SVG Background Illustration -->
  <div class="absolute inset-0 pointer-events-none z-0 flex items-center justify-center opacity-[0.08] dark:opacity-[0.04]">
    <svg class="w-full max-w-[800px] h-auto max-h-[85vh]" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.5">
      <!-- Grid Lines -->
      <g stroke-dasharray="5,5">
        <circle cx="400" cy="400" r="100" />
        <circle cx="400" cy="400" r="200" />
        <circle cx="400" cy="400" r="300" />
        <line x1="100" y1="400" x2="700" y2="400" />
        <line x1="400" y1="100" x2="400" y2="700" />
      </g>
      <!-- DNA Helix / Waveform representing biology -->
      <path d="M 150 400 Q 200 300 250 400 T 350 400 T 450 400 T 550 400 T 650 400" stroke-width="2" />
      <path d="M 150 400 Q 200 500 250 400 T 350 400 T 450 400 T 550 400 T 650 400" stroke-width="2" />
      <!-- Mechanical Bionic Hand representation -->
      <path d="M 370 650 L 430 650 L 420 580 L 380 580 Z" />
      <path d="M 380 580 L 350 500 L 450 500 L 420 580" />
      <path d="M 350 500 L 330 400 L 470 400 L 450 500 Z" />
      <path d="M 340 470 L 290 440 L 250 440" />
      <circle cx="290" cy="440" r="4" fill="currentColor" />
      <circle cx="250" cy="440" r="4" fill="currentColor" />
      <path d="M 360 400 L 350 320 L 345 260" />
      <circle cx="360" cy="400" r="4" fill="currentColor" />
      <circle cx="350" cy="320" r="4" fill="currentColor" />
      <circle cx="345" cy="260" r="4" fill="currentColor" />
      <path d="M 395 400 L 395 300 L 395 230" />
      <circle cx="395" cy="400" r="4" fill="currentColor" />
      <circle cx="395" cy="300" r="4" fill="currentColor" />
      <circle cx="395" cy="230" r="4" fill="currentColor" />
      <path d="M 430 400 L 435 320 L 440 260" />
      <circle cx="430" cy="400" r="4" fill="currentColor" />
      <circle cx="435" cy="320" r="4" fill="currentColor" />
      <circle cx="440" cy="260" r="4" fill="currentColor" />
      <path d="M 465 400 L 475 340 L 485 290" />
      <circle cx="465" cy="400" r="4" fill="currentColor" />
      <circle cx="475" cy="340" r="4" fill="currentColor" />
      <circle cx="485" cy="290" r="4" fill="currentColor" />
      <path d="M 50 150 L 150 150 L 170 110 L 190 220 L 210 130 L 230 160 L 240 150 L 350 150" stroke-width="2" />
      <path d="M 450 150 L 550 150 L 570 110 L 590 220 L 610 130 L 630 160 L 640 150 L 750 150" stroke-width="2" />
    </svg>
  </div>

  <!-- Soft Floating Blobs -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-1/4 left-1/4 w-72 h-72 sm:w-96 sm:h-96 bg-brand-accent/25 dark:bg-brand-primary/10 rounded-full blur-3xl blob-animate"></div>
    <div class="absolute bottom-1/4 right-1/4 w-72 h-72 sm:w-96 sm:h-96 bg-sky-200/25 dark:bg-sky-900/10 rounded-full blur-3xl blob-animate-slow"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-brand-accent/15 dark:bg-pink-900/5 rounded-full blur-3xl blob-animate-medium"></div>
  </div>

  <!-- Fixed Top-Right Corner Controls -->
  <div class="fixed top-4 right-4 z-50 flex items-center space-x-3 rtl:space-x-reverse">
    <button class="theme-toggle p-2.5 rounded-xl text-gray-650 dark:text-gray-300 hover:bg-white/60 dark:hover:bg-gray-900/60 transition-all border border-gray-200/50 dark:border-gray-200 backdrop-blur-md bg-white/40 dark:bg-black/40" aria-label="Toggle theme">
      <svg class="w-5 h-5 theme-toggle-moon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg class="w-5 h-5 theme-toggle-sun hidden" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
    <button class="rtl-toggle p-2.5 rounded-xl text-gray-650 dark:text-gray-300 hover:bg-white/60 dark:hover:bg-gray-900/60 transition-all border border-gray-200/50 dark:border-gray-200 backdrop-blur-md bg-white/40 dark:bg-black/40 flex items-center justify-center" aria-label="Toggle RTL mode">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
  <path d="M8 3 4 7l4 4"/>
  <path d="M4 7h16"/>
  <path d="m16 21 4-4-4-4"/>
  <path d="M20 17H4"/>
</svg>
              </button>
  </div>

  <!-- ACTUAL SITE CONTENT (Centered Authentication Card Only Layout) -->
  <div class="actual-content opacity-0 w-full z-10 flex items-center justify-center pointer-events-none">
    <div id="nav-container" class="fixed top-0 left-0 right-0 z-[100] w-full"></div>
    <main class="w-[90%] max-w-[380px] sm:max-w-[420px] md:max-w-[460px] glass-panel p-8 sm:p-10 rounded-[24px] border border-white/40 dark:border-gray-200/40 shadow-2xl auth-card pointer-events-auto transition-all duration-300 my-4">
      
      <!-- Logo + Brand Name at Top Inside Card -->
      <div class="text-center mb-6">
        <div class="flex justify-center mb-4">
          <a href="../index.html" class="flex items-center space-x-2 rtl:space-x-reverse" style="display: flex !important; flex-direction: row !important; align-items: center !important; gap: 8px !important;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 text-[#0F4C81] dark:text-[#67E8F9]" style="flex-shrink: 0 !important;">
                  <path d="M4.5 16.5c-1.5-1.5-2.5-3.5-2.5-6s2-8 6-8 8 2.5 8 6.5-1.5 5-4.5 6.5-4 1.5-7 1z" />
                  <circle cx="12" cy="10" r="3" />
                  <path d="M12 13v7M9 20h6" />
                </svg>
                <span class="font-heading font-semibold text-2xl tracking-tight bg-gradient-to-r from-[#0F4C81] via-[#0F4C81] to-[#14B8A6] bg-clip-text text-transparent dark:from-[#67E8F9] dark:via-[#67E8F9] dark:to-[#67E8F9]">
                  ApexFlex
                </span>
              </a>
        </div>
        <h2 class="text-2xl sm:text-3xl font-semibold font-heading text-gray-955 dark:text-white mb-2">Create Account</h2>
        <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400">Join ApexFlex to manage referrals and track fabrications</p>
      </div>
      
      <!-- Registration Form -->
      <form data-validate class="space-y-4">
        <div class="space-y-1.5">
          <label for="signup-name" class="text-xs font-semibold text-gray-750 dark:text-gray-300">Full Name *</label>
          <input type="text" id="signup-name" required class="w-full px-4 py-3 bg-white/40 dark:bg-[#0A0A0A] border border-gray-300 dark:border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-primary dark:focus:ring-brand-secondary transition-all text-gray-900 dark:text-white" placeholder="John Doe">
        </div>

        <div class="space-y-1.5">
          <label for="signup-email" class="text-xs font-semibold text-gray-750 dark:text-gray-300">Email Address *</label>
          <input type="email" id="signup-email" required class="w-full px-4 py-3 bg-white/40 dark:bg-[#0A0A0A] border border-gray-300 dark:border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-primary dark:focus:ring-brand-secondary transition-all text-gray-900 dark:text-white" placeholder="you@example.com">
        </div>

        <div class="space-y-1.5">
          <label for="signup-phone" class="text-xs font-semibold text-gray-750 dark:text-gray-300">Phone Number *</label>
          <input type="tel" id="signup-phone" required class="w-full px-4 py-3 bg-white/40 dark:bg-[#0A0A0A] border border-gray-300 dark:border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-primary dark:focus:ring-brand-secondary transition-all text-gray-900 dark:text-white" placeholder="+1 (555) 000-0000">
        </div>
        
        <div class="space-y-1.5">
          <label for="signup-password" class="text-xs font-semibold text-gray-750 dark:text-gray-300">Password (8+ chars) *</label>
          <div class="relative">
            <input type="password" id="signup-password" required class="w-full px-4 py-3 bg-white/40 dark:bg-[#0A0A0A] border border-gray-300 dark:border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-primary dark:focus:ring-brand-secondary transition-all pr-12 rtl:pl-12 rtl:pr-4 text-gray-900 dark:text-white" placeholder="••••••••">
            
            <!-- Password Eye Toggler -->
            <button type="button" class="password-toggle absolute top-1/2 right-4 rtl:left-4 rtl:right-auto -translate-y-1/2 text-gray-500 dark:text-gray-400 hover:text-gray-650" aria-label="Toggle password visibility">
              <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="w-5 h-5 eye-off-icon hidden" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <!-- Password Strength Indicator bar target -->
          <div class="w-full bg-gray-200 dark:bg-[#171717] h-1 rounded-full mt-1.5 overflow-hidden">
            <div id="password-strength-bar" class="h-full w-0 transition-all duration-300"></div>
          </div>
          <p id="password-strength-text" class="text-[9px] mt-1"></p>
        </div>

        <div class="space-y-1.5">
          <label for="signup-confirm-password" class="text-xs font-semibold text-gray-750 dark:text-gray-300">Confirm Password *</label>
          <div class="relative">
            <input type="password" id="signup-confirm-password" required class="w-full px-4 py-3 bg-white/40 dark:bg-[#0A0A0A] border border-gray-300 dark:border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-primary dark:focus:ring-brand-secondary transition-all pr-12 rtl:pl-12 rtl:pr-4 text-gray-900 dark:text-white" placeholder="••••••••">
            
            <!-- Password Eye Toggler -->
            <button type="button" class="password-toggle absolute top-1/2 right-4 rtl:left-4 rtl:right-auto -translate-y-1/2 text-gray-500 dark:text-gray-400 hover:text-gray-650" aria-label="Toggle password visibility">
              <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="w-5 h-5 eye-off-icon hidden" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="flex items-start text-xs py-1">
          <label class="flex items-start text-gray-500 dark:text-gray-400 cursor-pointer select-none">
            <input type="checkbox" required class="mt-1 mr-2 rtl:ml-2 rounded border-gray-300 text-purple-955 focus:ring-brand-primary dark:bg-[#111111] dark:border-gray-200">
            <span>I agree to the <a href="#" class="text-brand-primary dark:text-brand-secondary hover:underline">Terms &amp; Conditions</a> and <a href="#" class="text-brand-primary dark:text-brand-secondary hover:underline">Privacy Policy</a> *</span>
          </label>
        </div>

        <button type="submit" class="w-full py-3.5 bg-brand-primary dark:bg-brand-secondary text-white font-semibold rounded-xl hover:bg-brand-primary dark:hover:bg-brand-secondary transition-all shadow-md hover:scale-[1.01] mt-2">
          Create Account
        </button>
      </form>

      <!-- Glass-Friendly Divider -->
      <div class="flex items-center my-6">
        <div class="flex-grow border-t border-gray-200 dark:border-gray-200"></div>
        <span class="flex-shrink mx-4 text-[10px] text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase tracking-wider font-semibold">Or sign up with</span>
        <div class="flex-grow border-t border-gray-200 dark:border-gray-200"></div>
      </div>

      <!-- Social Icons Only (Google, Facebook, Apple) -->
      <div class="flex justify-center items-center space-x-4 rtl:space-x-reverse">
        <button type="button" class="w-12 h-12 flex items-center justify-center bg-white/50 hover:bg-white/80 dark:bg-[#111111] dark:hover:bg-gray-850 rounded-xl border border-gray-200 dark:border-gray-200 transition-all hover:scale-105" aria-label="Sign up with Google">
          <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
          </svg>
        </button>
        
        <button type="button" class="w-12 h-12 flex items-center justify-center bg-white/50 hover:bg-white/80 dark:bg-[#111111] dark:hover:bg-gray-850 rounded-xl border border-gray-200 dark:border-gray-200 transition-all hover:scale-105" aria-label="Sign up with Facebook">
          <svg class="w-5 h-5 fill-current text-[#1877F2]" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </button>
        
        <button type="button" class="w-12 h-12 flex items-center justify-center bg-white/50 hover:bg-white/80 dark:bg-[#111111] dark:hover:bg-gray-850 rounded-xl border border-gray-200 dark:border-gray-200 transition-all hover:scale-105" aria-label="Sign up with Apple">
          <svg class="w-5 h-5 fill-current text-gray-900 dark:text-white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.54 9.103 1.51 12.06 1.005 1.45 2.175 3.078 3.738 3.017 1.512-.06 2.087-.975 3.914-.975 1.824 0 2.342.975 3.93.94 1.62-.028 2.637-1.475 3.627-2.93 1.147-1.674 1.62-3.297 1.637-3.382-.036-.015-3.155-1.21-3.187-4.805-.025-3.003 2.455-4.437 2.57-4.509-1.41-2.062-3.568-2.29-4.332-2.34-1.92-.162-3.41 1.01-4.28 1.01zm2.597-4.545c.805-.978 1.35-2.35 1.2-3.71-1.168.046-2.585.777-3.42 1.76-.745.856-1.396 2.246-1.217 3.593 1.298.1 2.63-.668 3.437-1.643z"/>
          </svg>
        </button>
      </div>

      <p class="text-sm text-center text-gray-500 dark:text-gray-400 mt-8">
        Already have an account? 
        <a href="login.html" class="text-brand-primary dark:text-brand-secondary font-semibold hover:underline">Login</a>
      </p>
    </main>
    <div id="footer-container"></div>
  </div>

  <!-- Global scripts -->
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/forms.js"></script>
</body>
</html>
