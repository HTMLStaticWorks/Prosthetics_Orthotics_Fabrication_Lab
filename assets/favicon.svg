<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B0764"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#bae6fd"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle inner glow ring -->
  <rect x="16" y="16" width="480" height="480" rx="84" ry="84" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
  <!-- Logo icon centered, scaled to ~300x300 at center -->
  <!-- Original viewBox 0 0 24 24 scaled up: multiply coords by 300/24 = 12.5, offset to center (106, 80) -->
  <g transform="translate(106, 80) scale(12.5)" fill="none" stroke="url(#icon)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body/limb organic path -->
    <path d="M4.5 16.5c-1.5-1.5-2.5-3.5-2.5-6s2-8 6-8 8 2.5 8 6.5-1.5 5-4.5 6.5-4 1.5-7 1z"/>
    <!-- Joint circle -->
    <circle cx="12" cy="10" r="3"/>
    <!-- Leg/prosthetic rods -->
    <path d="M12 13v7M9 20h6"/>
  </g>
</svg>
